services:

  # ─── Aplicação PHP (Laravel) ──────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: questforge_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - questforge_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Não expõe portas - acesso apenas via nginx

  # ─── Frontend React (Produção - Build Estático) ──────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: questforge_frontend
    restart: unless-stopped
    networks:
      - questforge_net
    # Não expõe portas - acesso apenas via nginx

  # ─── Nginx (Gateway Principal - ÚNICA PORTA PÚBLICA) ─────
  nginx:
    image: nginx:1.27-alpine
    container_name: questforge_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"  # Porta 80 em produção
    volumes:
      - ./backend:/var/www/html  # Para servir assets do Laravel
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
    networks:
      - questforge_net
    depends_on:
      - app
      - frontend

  # ─── PostgreSQL (Banco de Dados) ─────────────────────────
  db:
    image: postgres:16-alpine
    container_name: questforge_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-questforge}
      POSTGRES_USER: ${DB_USERNAME:-questforge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - questforge_pgdata:/var/lib/postgresql/data
      - ./logs/postgres:/var/log/postgresql
    command: >
      postgres
      -c logging_collector=on
      -c log_destination=stderr
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql.log
      -c log_truncate_on_rotation=on
      -c log_rotation_age=1d
      -c log_rotation_size=100MB
    networks:
      - questforge_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-questforge}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Cache / Queues / Sessions) ───────────────────
  redis:
    image: redis:7-alpine
    container_name: questforge_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - questforge_redis_data:/data
    networks:
      - questforge_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

# ─── Volumes persistentes ────────────────────────────────────
volumes:
  questforge_pgdata:
    driver: local
  questforge_redis_data:
    driver: local

# ─── Rede interna do projeto ─────────────────────────────────
networks:
  questforge_net:
    driver: bridge
